<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sample Web Page</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>Welcome to My Website</h1>

    <!-- Basic Paragraph -->
    <p>This is a simple paragraph of text on my new web page.</p>

    <!-- Hyperlink Example -->
    <p>Visit the <a href="https://www.w3schools.com" target="_blank">W3Schools Tutorials Website</a> to learn more.</p>

    <!-- Image Example -->
    <img src="https://placeholder.com" alt="Sample Placeholder Image" width="150" height="150">

    <!-- Unordered List Example -->
    <h3>My Favorite Fruits</h3>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ul>

</body>
</html>
